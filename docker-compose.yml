version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: designflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-designflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-designflow123}
      POSTGRES_DB: ${DB_NAME:-designflow_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-designflow} -d ${DB_NAME:-designflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
