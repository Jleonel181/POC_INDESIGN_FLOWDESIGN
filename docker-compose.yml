version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: designflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-designflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-designflow123}
      POSTGRES_DB: ${DB_NAME:-designflow_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-designflow} -d ${DB_NAME:-designflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowdesign-network

  esb:
    build:
      context: ./esb
      dockerfile: Dockerfile
    container_name: designflow-esb
    restart: unless-stopped
    env_file:
      - ./esb/.env
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - flowdesign-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: designflow-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override ESB_URL to use internal service name instead of localhost
      ESB_URL: http://esb:4000
      DB_HOST: postgres
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      esb:
        condition: service_healthy
    networks:
      - flowdesign-network

networks:
  flowdesign-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
