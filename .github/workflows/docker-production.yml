name: CD - Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-production:
    name: Build and Push Production Image
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Dockerfile exists
        run: |
          if [ ! -f backend/Dockerfile ]; then
            echo "::error::Dockerfile not found at backend/Dockerfile"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image name
        id: image
        run: |
          IMAGE=$(echo "${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:production-latest
            ${{ steps.image.outputs.name }}:production-${{ github.sha }}
